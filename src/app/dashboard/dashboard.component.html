<div class="container">
  <div class="dashboard">
    <div class="header">
      <h2>Dashboard</h2>
    </div>
    <div class="tiles-container">
      <div *ngFor="let tile of navTiles" class="tile card" [routerLink]="['/' + tile.route]">
        <img [src]="tile.imageUrl" alt="{{ tile.title }}">
        <div class="tile-content">
          <h3>{{ tile.title }}</h3>
          <p>{{ tile.description }}</p>
        </div>
      </div>
    </div>
  </div>
</div>
